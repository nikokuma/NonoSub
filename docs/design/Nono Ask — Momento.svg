  <rect width="1200" height="760" rx="24" fill="#efe8de"/><text x="42" y="58" font-family="Avenir Next Condensed,Arial" font-size="30" font-weight="800" fill="#1b1719">Nono Ask — Momento</text><text x="42" y="84" font-family="Avenir,Arial" font-size="12" fill="#6b5f64">PRIVATE QUESTION → THINKING → CHALKBOARD · CORAL ACCENT FOLLOWS SPEAKER</text>
